<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS 실습용 대시보드</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./05_regex.css">
</head>
<body>
    <section class="login-section">
        <h2>로그인</h2>
        <div class="form-group">
            <label>아이디</label>
            <input type="text" id="login-id" placeholder="user 입력">
        </div>
        <div class="form-group">
            <label>비밀번호</label>
            <input type="password" id="login-pw" placeholder="qwer1234! 입력">
        </div>
        <button id="btn-login" onclick="Q1()">로그인</button>
    </section>
    <script>
        //     <로그인>
        //      * 공통 : 비어있는 문자 불가(로그인 버튼 클릭 시)
        //      * const id = "user";   /  const pwd = "qwer1234!"
        //          - 아이디 또는 비밀번호를 입력하지 않을 경우 : alert "아이디 또는 비밀번호를 입력해주세요." 출력 
        //          - 아이디 또는 비밀번호가 일치하지 않을 경우 : alert "아이디 또는 비밀번호가 틀렸습니다." 출력
        //          - 위의 변수와 모두 일치 할 경우 : alert "로그인 되었습니다." 출력 
        function Q1() {
            // alert("문자를 1개 이상 입력해주세요.");
            const loginId = document.getElementById("login-id").value;
            const loginPw = document.getElementById("login-pw").value;

            const notSpace = /[A-Za-z0-9!@#$]+/;

            if (!notSpace.test(loginId) && !notSpace.test(loginPw)) {
                console.log(notSpace.test(loginId));
                alert("아이디 또는 비밀번호를 입력해주세요.");
            } else if (loginId !== "user" || loginPw !== "qwer1234!") {
                alert("아이디 또는 비밀번호가 틀렸습니다.");
            } else {
                alert("로그인 되었습니다.");
            }
        }
    </script>


    <section class="portfolio-section">
        <h2>포트폴리오 추가</h2>
        <div class="form-group">
            <label>프로젝트 제목</label>
            <input type="text" id="port-title" oninput="Q2_title()" placeholder="최대 100글자" maxlength="100">
        </div>
        <div class="form-group">
            <label>설명</label>
            <textarea id="port-desc" placeholder="프로젝트 내용을 입력해주세요."></textarea>
        </div>
        <button id="btn-port" onclick="Q2()">새로운 프로젝트 추가하기</button>
        <div id="portfolio-list"></div>
    </section>
    <script>
        //     <포트폴리오>
        //      - 제목은 최대 100글자까지 가능
        //      - 제목이 100글자를 초과하면 alert "제목이 너무 깁니다."

        //      * 공통 : 비어있는 문자 불가(새로운 프로젝트 추가하기 버튼 클릭 시)
        //          - 제목이 비어있다면 alert "제목을 입력해주세요"
        //          - 설명이 비어있다면 alert "설명을 입력해주세요."

        //      * 추가하기 성공 시
        //          - 아래의 코드를 참고하여 내용을 추가하세요. (클래스 및 텍스트 노드 추가)
        //             item.className = 'portfolio-item';
        //             item.innerHTML = `<strong>${portTitle.value}</strong><p style="margin:5px 0 0; font-size:0.9rem;">${portDesc.value}</p>`;
        function Q2() {
            const portTitle = document.getElementById("port-title");
            const portDesc = document.getElementById("port-desc");
            const item = document.getElementById("portfolio-list");
            const none = /.+/;
            if (!none.test(portTitle.value)) {
                alert("제목을 입력해주세요.");
            } else if(!none.test(portDesc.value)) {
                alert("설명을 입력해주세요.");
            } else {
                item.className = 'portfolio-item';
                item.innerHTML = `<strong>${portTitle.value}</strong><p style="margin:5px 0 0; font-size:0.9rem;">${portDesc.value}</p>`; 
            }
            
        }

        function Q2_title() {
            const portTitle = document.getElementById("port-title").value;
            const portDesc = document.getElementById("port-desc").value;
            const maxTitle = /^.{0,100}$/;
            console.log(maxTitle.test(portTitle));

            if (!maxTitle.test(portTitle)) {
                alert("제목이 너무 깁니다.");
            }
        }
    </script>


    <section class="contact-section">
        <h2>연락하기</h2>
        <div class="form-group">
            <label>이름</label>
            <input type="text" id="contact-name" oninput="Q3()" placeholder="한글 이름">
        </div>
        <div class="form-group">
            <label>이메일</label>
            <input type="email" id="contact-email" oninput="Q3()" placeholder="example@test.com">
        </div>
        <div class="form-group">
            <label>메시지</label>
            <textarea id="contact-msg" oninput="Q3()" maxlength="500" placeholder="메시지를 입력해 주세요 (최대 500자)"></textarea>
            <div class="char-count"><span id="msg-count" oninput="Q3()">0</span> / 500</div>
        </div>
        <button id="btn-contact" onclick="Q3_button()">전송</button>
    </section>
    <script>
        //     <연락하기>
        //      - 이름 : 한글만 가능
        //      - 이메일 : 이메일 주소가 유효한지 확인   ex) test@test.com
        //      - 메시지 : 사용자가 입력한 글자를 실시간으로 업데이트 / 최대 500글자까지 사용 가능
        function Q3() {
            const contactMsg = document.getElementById("contact-msg");
            const msgCount = document.getElementById("msg-count");

            msgCount.textContent = contactMsg.value.length;

            const msg = /^.{0,500}$/;

            if (!msg.test(contactMsg.value)) {
                alert("최대 500글자까지 사용 가능합니다.")
            }
        }

        //      * 전송 버튼 클릭 시
        //          - 이름에 한글말고 다른게 있으면 alert "이름은 한글만 사용 가능합니다"
        //          - 이메일 주소가 유효하지 않으면 alert "이메일 양식이 유효하지 않습니다."
        function Q3_button() {
            const contactName = document.getElementById("contact-name");
            const contactEmail = document.getElementById("contact-email");
            const contactMsg = document.getElementById("contact-msg");

            const name = /^[가-힣]+$/;
            const email = /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/;

            if (contactName.value === "") {
                alert("이름을 입력해주세요.");
            } else if (!name.test(contactName.value)) {
                alert("이름은 한글만 사용 가능합니다.");
            } else if (contactEmail.value === "") {
                alert("이메일을 입력해주세요.");
            } else if (!email.test(contactEmail.value)) {
                alert("이메일 양식이 유효하지 않습니다.")
            } else if (contactMsg.value === "") {
                alert("메시지를 입력해주세요.")
            }
        }
        
        //     * 공통 : 비어있는 문자 불가(전송 버튼 클릭 시)
        //          - 이름이 비어있다면 alert "이름을 입력해주세요"
        //          - 이메일이 비어있다면 alert "이메일을 입력해주세요."
        //          - 메시지가 비어있다면 alert "메시지를 입력해주세요."
    </script>
    <section class="join-section">
        <h2>회원가입</h2>
        <div class="form-group">
            <label>이름</label>
            <input type="text" id="join-name" onkeyup="Q4()" placeholder="한글만 입력">
            <div id="msg-name" class="msg"></div>
        </div>
        <div class="form-group">
            <label>아이디</label>
            <input type="text" id="join-id" onkeyup="Q4()" placeholder="5~20자 영문, 숫자, _, -">
            <div id="msg-id" class="msg"></div>
        </div>
        <div class="form-group">
            <label>비밀번호</label>
            <input type="password" id="join-pw" onkeyup="Q4()" placeholder="8~16자 대소문자/특수/숫자 포함">
            <div id="msg-pw" class="msg"></div>
        </div>
        <div class="form-group">
            <label>비밀번호 확인</label>
            <input type="password" id="join-pw2" onkeyup="Q4()" placeholder="비밀번호 재입력">
            <div id="msg-pw2" class="msg"></div>
        </div>
        <button id="btn-join" onclick="Q4_button()">회원 가입</button>
    </section>
    <script>
        let nameBl = false;
        let idBl = false;
        let pwBl = false;
        let pw2Bl = false;
        function Q4() {
            const joinName = document.getElementById("join-name");
            const joinId = document.getElementById("join-id");
            const joinPw = document.getElementById("join-pw");
            const joinPw2 = document.getElementById("join-pw2");

            const msgName = document.getElementById("msg-name");
            const msgId = document.getElementById("msg-id");
            const msgPw = document.getElementById("msg-pw");
            const msgPw2 = document.getElementById("msg-pw2");


            const name = /^[가-힣]+$/;
            const id = /^[a-z0-9_-]{5,20}$/;
            const pw = /^(?=.*[A-Za-z])(?=.*[0-9])(?=.*[^A-Za-z0-9가-힣ㄱ-ㅎ]).{8,16}$/;

            if (!name.test(joinName.value)) {
                msgName.textContent = "한글만 사용 가능합니다.";
                msgName.style.color = "red";
                nameBl = false;
            } else {
                msgName.textContent = "";
                nameBl = true;
            }

            if (!id.test(joinId.value)) {
                msgId.textContent = "5~20자의 영문 소문자, 숫자와 특수기호(_),(-)만 사용 가능합니다.";
                msgId.style.color = "red";
                idBl = false;
            } else {
                msgId.textContent = "사용 가능한 아이디입니다.";
                msgId.style.color = "green";
                idBl = true;
            }

            if (!pw.test(joinPw.value)) {
                msgPw.textContent = "8~16자의 영문 대/소문자, 숫자, 특수문자를 사용해 주세요.";
                msgPw.style.color = "red";
                pwBl = false;
            } else {
                msgPw.textContent = "사용 가능한 비밀번호입니다.";
                msgPw.style.color = "green";
                pwBl = true;
            }

            if (joinPw.value !== joinPw2.value) {
                msgPw2.textContent = "비밀번호가 일치하지 않습니다.";
                msgPw2.style.color = "red";
                pw2Bl = false;
            } else {
                msgPw2.textContent = "비밀번호가 일치합니다.";
                msgPw2.style.color = "green";
                pw2Bl = true;
            }
        }

        function Q4_button() { 

            if (nameBl && idBl && pwBl && pw2Bl) {
                alert("회원가입이 완료되었습니다.")
            }
            if (!nameBl) {
                alert("이름을 입력해주세요.");
            } else if (!idBl) {
                alert("아이디를 입력해주세요.");
            } else if (!pwBl) {
                alert("비밀번호를 입력해주세요.");
            } else if (!pw2Bl) {
                alert("비밀번호가 일치하지 않습니다.");
            }
        }
        //     <회원가입>
        //      - 이름 : 한글만 가능
        //      - 아이디 : 영어, 숫자, 특수기호(_),(-)만 가능 / 5자 이상 20자 이하
        //      - 비밀번호 : 대소문자 또는 특수문자, 숫자 최소 1개 이상 / 8자리 이상 16자 이하
        //      - 비밀번호 확인 : 비밀번호와 동일해야 함

        //      * 일치하지 않을 경우 input의 아래 부분에 텍스트 출력(keyup 이벤트 활용)
        //          - 이름이 일치하지 않을 경우 : "한글만 사용 가능합니다."    // 색상 red
        //          - 이름이 일치할 경우 : ""   (빈 문자열 출력)

        //      - 아이디가 일치하지 않을 경우 : "5~20자의 영문 소문자, 숫자와 특수기호(_),(-)만 사용 가능합니다."    // 색상 red
        //      - 아이디가 일치할 경우 : "사용 가능한 아이디입니다."    // 색상 green

        //      - 비밀번호가 일치하지 않을 경우 : "8~16자의 영문 대/소문자, 숫자, 특수문자를 사용해 주세요."    // 색상 red
        //      - 비밀번호가 일치할 경우 : "사용 가능한 비밀번호입니다."    // 색상 green

        //      - 비밀번호 확인이 비밀번호와 일치하지 않을 경우 : 비밀번호가 일치하지 않습니다."    // 색상 red
        //      - 비밀번호 확인이 비밀번화 일치할 경우 : "비밀번호가 일치합니다."    // 색상 green

        //      * 공통 : 비어있는 문자 불가(회원 가입 버튼 클릭 시) 
        //          - 비어있다면 alert "이름을 입력해주세요."
        //          - 아이디가 비어있다면 alert "아이디를 입력해주세요."
        //          - 비밀번호가 비어있다면 alert "비밀번호를 입력해주세요."
        //          - 비밀번호 확인이 일치하지 않는다면 alert "비밀번호가 일치하지 않습니다"

	    //	    * 공통 : 모든 유효성 검사가 통과해야 회원가입 버튼 클릭 시 "회원가입이 완료되었습니다" alert 출력
	    // 		    - 유효성 검사가 1개라도 실패했다면 "입력값을 다시 확인해주세요." alert 출력
    </script>
</body>
</html>
