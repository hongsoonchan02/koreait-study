    <script>
        // 콜백 함수
        function getUserData(callback) {
            setTimeout(() => {
                const userData = {name : "홍길동", age : 25};
                callback(userData);
            }, 1000)
        }

        getUserData(function(data) {          
            console.log(data);
        })

        function printMessage(message, callback) {
            callback(message);
        }

        printMessage("Hello, JavaScript!", (message) => {
            console.log(message);
        })


        function addAndCallback(num1, num2, callback) {
            callback(num1 + num2);
        }

        addAndCallback(4, 7, (result) => {
            console.log(result); 
        })
    </script>
    
    <script>
        // 프로미스(Promise)
        //  - 콜백 지옥을 해결하기 위해 등장한 비동기 처리를 위한 객체

        // 프로미스 메서드
        //  - resolve : 작업 성공 시
        //  - reject : 작업 실패 시

        // 프로미스 상태
        //  - pending : 작업이 완료되지 않은 상태 (대기 상태)
        //  - fulfilled : 작업이 성공적으로 완료된 상태 (완료 상태)
        //  - rejected : 작업이 실패한 상태 (실패 상태)

        function getUser() {
            return new Promise((resolve, reject) => {

                const user = {name: "홍길동", age: 22};
                // resolve(user); // 작업 성공 시 user 객체를 던져주겠다.
                reject("작업 실패!!!");
            })
        }

        getUser()
            .then((data) => { // 작업 성공 시(resolve 호출 시 실행되는 영역)
                console.log(data);
            })
            .catch((errorMsg) => {
                console.error(errorMsg);
            })

        function getUserData2() {
            return new Promise((resolve, reject) => {
                setTimeout(() => {
                    const userData = {name: "첫 번째 데이터", num: 1};
                    resolve(userData);
                }, 3000)
            })
        }
        function getUserData3() {
            return new Promise((resolve, reject) => { 
                setTimeout(() => {
                    const userData = {name: "두 번째 데이터", num: 1};
                    resolve(userData);
                }, 1000)
            })
        }
        function getUserData4() {
            return new Promise((resolve, reject) => {
                setTimeout(() => {
                    const userData = {name: "세 번째 데이터", num: 1};
                    resolve(userData);
                }, 2000)
            })
        }

        async function fetchUserData() {
            try {
                console.log("async/await 시작")
                // 1. getUserData2() 호출
                const result1 = await getUserData2();
                console.log(result1.name);

                // 2. 1번 호출이 끝나면 getUserData3() 호출
                const result2 = await getUserData3();
                console.log(result2.name);

                // 3. 2번 호출이 끝나면 getUserData4() 호출
                const result3 = await getUserData4();
                console.log(result3.name);

                console.log("async/await 종료")
            } catch(error) {
                console.error(error);
            }
        }

        fetchUserData();

        // getUserData2()
        //     .then((data) => {
        //         console.log(data);
        //         return getUserData3();
        //     })
        //     .then((data) => { // 메서드 체이닝
        //         console.log(data);
        //         return getUserData4();
        //     })
        //     .then((data) => {
        //         console.log(data);
        //     })
        //     .catch((error) => {
        //         console.error(error);
        //     })
        
        function laterMessage() {
            return new Promise((resolve, reject) => {
                setTimeout(() => {
                    resolve("성공했습니다!")
                }, 5000)
            })
        }

        laterMessage()
            .then((data) => {
                console.log(data);
            })
            .catch((error) => {
                console.log(error);
            })

        function addNumbers(num1, num2) {
            return new Promise((resolve, reject) => {
                if(typeof num1 === "number" && typeof num2 === "number") {
                    resolve(num1 + num2);
                } else {
                    reject("숫자를 전달해주세요.")
                }
            })
        }
        
        addNumbers(10, 7)
            .then((data) => {
                console.log("덧셈 결과:" + data);
            })
            .catch((msg) => {
                console.error(msg);
            })












    </script>
