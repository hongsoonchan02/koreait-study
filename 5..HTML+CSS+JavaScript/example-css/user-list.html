<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원 목록</title>
    <link rel="stylesheet" href="./user-list.css">
</head>
<body>
    <div class="layout">
        <header class="header">
            <div class="logo">KoreaNirsa</div>
            <div class="header-right">
                <span class="admin-email">admin@example.com</span>
                <button class="logout-btn">로그아웃</button>
            </div>
        </header>

        <aside class="sidebar">
            <button class="menu-btn active">회원 목록</button>
        </aside>

        <main class="main-content">
            <h1>회원 목록</h1>

            <div class="table-card">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>이름</th>
                            <th>이메일</th>
                            <th>상세</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>1</td>
                            <td>홍길동</td>
                            <td>hong@example.com</td>
                            <td>
                                <button class="detail-btn">보기</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>
    <script src="./user-list.js"></script>
</body>
</html>
