<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원 상세</title>
    <link rel="stylesheet" href="./user-detail.css">
</head>
<body>
    <div class="layout">
        <header class="header">
            <div class="logo">KoreaNirsa</div>

            <div class="header-right">
                <span class="admin-email">admin@example.com</span>
                <button class="logout-btn">로그아웃</button>

        </header>

        <aside class="sidebar">
            <button class="menu-btn">회원 목록</button>

        <main class="main-content">
            <h1>회원 상세</h1>

            <div class="detail-card">
                <p><strong>ID:</strong> 1</p>
                <p><strong>이름:</strong> 홍길동</p>
                <p><strong>이메일:</strong> hong@example.com</p>
                <p><strong>전화번호:</strong> 010-1234-5678</p>
                <p><strong>주소:</strong> 서울특별시</p>

                <button class="list-btn" id="listBtn">목록으로</button>
            </div>
        </main>
    </div>

    <script src="./user-detail.js"></script>
</body>
</html>
